# Web CI — build the React bundle and publish an nginx image to GHCR.
#
# Implements ARCHITECTURE.md §10 (Web):
#   1. push to main triggers
#   2. npm ci && npm run build -> web/dist/
#   3. build Docker image (nginx-alpine + dist/)
#   4. push to GHCR tagged with git SHA + latest
#
# STARTING POINT: validated syntax, but not yet run end-to-end. Adjust the Node
# version, build flags, and image name (`<you>`) before relying on it in prod.
name: web

on:
  push:
    branches: [main]
    paths:
      - 'web/**'
      - '.github/workflows/web.yml'
  workflow_dispatch:

env:
  # GHCR image name. Lowercased automatically below; replace owner as needed.
  IMAGE_NAME: ${{ github.repository_owner }}/pose-deck-web

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        working-directory: web
        run: npm ci

      - name: Build web bundle
        working-directory: web
        run: npm run build

      - name: Lowercase image name
        id: image
        run: echo "name=${IMAGE_NAME,,}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: web
          file: web/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ steps.image.outputs.name }}:${{ github.sha }}
            ghcr.io/${{ steps.image.outputs.name }}:latest
