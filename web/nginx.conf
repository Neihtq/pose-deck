# nginx config for the Pose Deck web SPA.
# Serves the static Vite bundle and routes all paths to index.html so the
# client-side router handles deep links. TLS + host routing are handled by
# the existing TrueNAS reverse proxy (ARCHITECTURE.md §1, §9).
server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # gzip for text assets.
    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # Long-cache fingerprinted assets emitted by Vite.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA fallback: unknown paths return index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Never cache the HTML entrypoint so new deploys are picked up.
    location = /index.html {
        add_header Cache-Control "no-cache";
    }
}
